name: flutter_ai_mcp
description: >-
  Model Context Protocol (MCP) integration for flutter_ai: connect to MCP servers
  over Streamable HTTP and expose their tools as flutter_ai tools that flow
  through the agent loop.
version: 0.1.0
homepage: https://github.com/ananmouaz/flutter_ai
repository: https://github.com/ananmouaz/flutter_ai/tree/main/packages/flutter_ai_mcp
issue_tracker: https://github.com/ananmouaz/flutter_ai/issues

topics:
  - ai
  - llm
  - mcp
  - tool-calling
  - agent

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  flutter_ai_core: ^0.1.0
  flutter_ai_tools: ^0.1.0
  mcp_client: ^2.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
