name: flutter_ai_elements
description: "Composable, themeable Flutter UI for AI chat: conversation view, message bubbles, a streaming-aware composer, and a loader, styled through a mobile-first theme extension."
version: 0.1.16
homepage: https://github.com/ananmouaz/flutter_ai
repository: https://github.com/ananmouaz/flutter_ai/tree/main/packages/flutter_ai_elements
issue_tracker: https://github.com/ananmouaz/flutter_ai/issues

topics:
  - ai
  - llm
  - chat
  - streaming
  - widgets

# Rendered on the pub.dev listing (up to 5).
screenshots:
  - description: "A streamed assistant message with Markdown formatting."
    path: screenshots/element_message_assistant.png
  - description: "Collapsible chain-of-thought reasoning disclosure."
    path: screenshots/element_reasoning.png
  - description: "A tool invocation card with arguments and result."
    path: screenshots/element_tool_invocation.png
  - description: "Syntax-highlighted code block with a copy action."
    path: screenshots/element_code_block.png
  - description: "Grounded answer with source citations."
    path: screenshots/element_sources.png

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

# Pure Flutter widgets (no platform channels) — supported everywhere Flutter is.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_ai_client: ^0.2.0
  flutter_ai_core: ^0.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
