name: flutter_ai_client
description: >-
  Provider-agnostic chat controller for flutter_ai. Wraps any LlmProvider in a
  Listenable UseChatController with optimistic send, cancellation, regeneration,
  and frame-batched streaming — without imposing a state-management library.
version: 0.1.0
repository: https://github.com/ananmouaz/flutter_ai/tree/main/packages/flutter_ai_client
issue_tracker: https://github.com/ananmouaz/flutter_ai/issues
homepage: https://github.com/ananmouaz/flutter_ai

topics:
  - ai
  - llm
  - chat
  - streaming
  - flutter

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

# Part of the flutter_ai workspace.
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_ai_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
