name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Formatting + static analysis run once on Linux (platform-independent, and
  # format is sensitive to line endings so we don't run it on Windows).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          channel: stable
          cache: true
      - run: flutter --version
      - name: Install dependencies
        run: flutter pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze

  # Unit/widget tests across platforms. (The demo's golden tests live under
  # demo/ and are intentionally not run here — they're platform-sensitive
  # screenshot diffs verified locally on the reference platform.)
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          channel: stable
          cache: true
      - run: flutter --version
      - name: Install dependencies
        run: flutter pub get
      # Test every package that has a test/ dir. Flutter packages use
      # `flutter test`; pure-Dart packages use `dart test`.
      - name: Test packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in packages/*/; do
            [ -d "${pkg}test" ] || continue
            echo "::group::test ${pkg}"
            if grep -q "sdk: flutter" "${pkg}pubspec.yaml"; then
              (cd "$pkg" && flutter test)
            else
              (cd "$pkg" && dart test)
            fi
            echo "::endgroup::"
          done
